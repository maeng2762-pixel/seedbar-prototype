services:
  - type: web
    name: seedbar-backend
    plan: free
    env: node
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: SUPABASE_URL
        value: placeholder
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: placeholder
      - key: OPENAI_API_KEY
        value: placeholder
      - key: JWT_SECRET
        value: placeholder
      - key: DATABASE_PATH    
        value: ./backend/db/seedbar.sqlite
