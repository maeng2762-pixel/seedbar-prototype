services:
  - type: web
    name: seedbar-backend
    env: node
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: SUPABASE_URL
        value: placeholder
      - key: SUPABASE_SERVICE_ROLE_KEY
        value: placeholder
      - key: OPENAI_API_KEY
        value: placeholder
      - key: JWT_SECRET
        value: placeholder
      - key: DATABASE_PATH    # SQLite 유지 시 (Render Persistent Disk 사용) 지원용
        value: /data/seedbar.sqlite
    disk:     # Supabase를 쓰기 전까지 데이터를 보존하기 위한 디스크 (필요 없으면 삭제 가능)
      name: seedbar-data
      mountPath: /data
      sizeGB: 1
